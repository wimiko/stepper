<svg width="780" height="480" xmlns="http://www.w3.org/2000/svg"
     font-family="Arial, sans-serif" font-size="11" fill="#333">

  <rect width="780" height="480" fill="#f5f5f5"/>

  <!-- Title -->
  <text x="390" y="22" text-anchor="middle" font-size="14" font-weight="bold">
    Stepper Controller — Wiring Diagram
  </text>

  <!-- ===== PSU ===== -->
  <rect x="20" y="35" width="120" height="85" rx="4" fill="#fff0f0" stroke="#c00" stroke-width="2"/>
  <text x="80" y="58" text-anchor="middle" font-weight="bold" fill="#c00">24V PSU</text>
  <text x="80" y="73" text-anchor="middle" font-size="9" fill="#666">Motor power</text>
  <circle cx="140" cy="68" r="3.5" fill="#c00"/>
  <circle cx="80" cy="120" r="3.5" fill="#444"/>
  <text x="143" y="71" font-size="9" fill="#c00">24V+</text>
  <text x="80" y="133" text-anchor="middle" font-size="9" fill="#444">GND</text>

  <!-- ===== HW-133 ===== -->
  <rect x="200" y="35" width="130" height="85" rx="4" fill="#fff8f0" stroke="#e80" stroke-width="2"/>
  <text x="265" y="58" text-anchor="middle" font-weight="bold" fill="#e80">HW-133</text>
  <text x="265" y="73" text-anchor="middle" font-size="9" fill="#666">24V → 5V</text>
  <circle cx="200" cy="68" r="3.5" fill="#c00"/>
  <circle cx="330" cy="68" r="3.5" fill="#c00"/>
  <circle cx="265" cy="120" r="3.5" fill="#444"/>
  <text x="197" y="71" text-anchor="end" font-size="9" fill="#999">IN+</text>
  <text x="333" y="71" font-size="9" fill="#c00">5V</text>
  <text x="265" y="133" text-anchor="middle" font-size="9" fill="#444">GND</text>

  <!-- ===== ESP32-C3 ===== -->
  <rect x="20" y="195" width="160" height="235" rx="4" fill="#eef2ff" stroke="#336cc1" stroke-width="2"/>
  <text x="100" y="217" text-anchor="middle" font-weight="bold" fill="#336cc1">ESP32-C3</text>
  <text x="100" y="231" text-anchor="middle" font-size="9" fill="#666">0.42" OLED</text>
  <circle cx="100" cy="195" r="3.5" fill="#c00"/>
  <circle cx="180" cy="260" r="3.5" fill="#c00"/>
  <circle cx="180" cy="315" r="3.5" fill="#36c"/>
  <circle cx="180" cy="335" r="3.5" fill="#36c"/>
  <circle cx="180" cy="370" r="3.5" fill="#090"/>
  <circle cx="180" cy="398" r="3.5" fill="#090"/>
  <circle cx="100" cy="430" r="3.5" fill="#444"/>
  <text x="112" y="192" font-size="9" fill="#c00">5V in</text>
  <text x="176" y="258" text-anchor="end" font-size="9" fill="#c00">3.3V</text>
  <text x="176" y="313" text-anchor="end" font-size="9" fill="#36c">RX GPIO20</text>
  <text x="176" y="333" text-anchor="end" font-size="9" fill="#36c">TX GPIO21</text>
  <text x="176" y="368" text-anchor="end" font-size="9" fill="#090">STEP GPIO4</text>
  <text x="176" y="396" text-anchor="end" font-size="9" fill="#090">DIR  GPIO3</text>
  <text x="100" y="443" text-anchor="middle" font-size="9" fill="#444">GND</text>

  <!-- ===== TMC2209 ===== -->
  <rect x="330" y="195" width="160" height="235" rx="4" fill="#f0fff0" stroke="#393" stroke-width="2"/>
  <text x="410" y="217" text-anchor="middle" font-weight="bold" fill="#393">TMC2209</text>
  <circle cx="330" cy="248" r="3.5" fill="#c00"/>
  <circle cx="330" cy="272" r="3.5" fill="#c00"/>
  <circle cx="330" cy="330" r="3.5" fill="#36c"/>
  <circle cx="330" cy="370" r="3.5" fill="#090"/>
  <circle cx="330" cy="398" r="3.5" fill="#090"/>
  <circle cx="490" cy="293" r="3.5" fill="#c60"/>
  <circle cx="490" cy="318" r="3.5" fill="#c60"/>
  <circle cx="490" cy="343" r="3.5" fill="#c60"/>
  <circle cx="490" cy="368" r="3.5" fill="#c60"/>
  <circle cx="415" cy="430" r="3.5" fill="#444"/>
  <text x="334" y="251" font-size="9" fill="#c00">VM (24V)</text>
  <text x="334" y="275" font-size="9" fill="#c00">VIO (3.3V)</text>
  <text x="334" y="333" font-size="9" fill="#36c">PDN_UART</text>
  <text x="334" y="373" font-size="9" fill="#090">STEP</text>
  <text x="334" y="401" font-size="9" fill="#090">DIR</text>
  <text x="486" y="291" text-anchor="end" font-size="9" fill="#c60">1A</text>
  <text x="486" y="316" text-anchor="end" font-size="9" fill="#c60">1B</text>
  <text x="486" y="341" text-anchor="end" font-size="9" fill="#c60">2A</text>
  <text x="486" y="366" text-anchor="end" font-size="9" fill="#c60">2B</text>
  <text x="415" y="443" text-anchor="middle" font-size="9" fill="#444">GND</text>
  <text x="410" y="234" text-anchor="middle" font-size="8" fill="#999">⊥ 100µF + 100nF on VM</text>

  <!-- ===== NEMA 17 ===== -->
  <rect x="600" y="255" width="120" height="140" rx="4" fill="#fafafa" stroke="#888" stroke-width="2"/>
  <text x="660" y="278" text-anchor="middle" font-weight="bold" fill="#555">NEMA 17</text>
  <text x="660" y="293" text-anchor="middle" font-size="9" fill="#888">Stepper Motor</text>
  <circle cx="600" cy="313" r="3.5" fill="#c60"/>
  <circle cx="600" cy="335" r="3.5" fill="#c60"/>
  <circle cx="600" cy="357" r="3.5" fill="#c60"/>
  <circle cx="600" cy="379" r="3.5" fill="#c60"/>
  <text x="604" y="316" font-size="9" fill="#c60">A+</text>
  <text x="604" y="338" font-size="9" fill="#c60">A−</text>
  <text x="604" y="360" font-size="9" fill="#c60">B+</text>
  <text x="604" y="382" font-size="9" fill="#c60">B−</text>

  <!-- ===== GND Rail ===== -->
  <line x1="20" y1="460" x2="730" y2="460" stroke="#444" stroke-width="2.5"/>
  <line x1="730" y1="456" x2="752" y2="456" stroke="#444" stroke-width="2.5"/>
  <line x1="733" y1="461" x2="749" y2="461" stroke="#444" stroke-width="1.5"/>
  <line x1="736" y1="466" x2="746" y2="466" stroke="#444" stroke-width="1"/>

  <!-- ===== WIRES ===== -->

  <!-- 24V+: PSU → HW-133 IN (horizontal red) -->
  <line x1="140" y1="68" x2="200" y2="68" stroke="#c00" stroke-width="2"/>
  <!-- 24V+: PSU → TMC VM (routed below top-row components) -->
  <polyline points="140,68 140,158 310,158 310,248 330,248"
            fill="none" stroke="#c00" stroke-width="2"/>
  <!-- Junction dot where both 24V wires leave PSU pin -->
  <circle cx="140" cy="68" r="4" fill="#c00"/>

  <!-- 5V: HW-133 out → ESP32 top (routed above row 2) -->
  <polyline points="330,68 370,68 370,168 100,168 100,195"
            fill="none" stroke="#c00" stroke-width="2"/>

  <!-- 3.3V: ESP32 → TMC VIO (dashed, routed through gap) -->
  <polyline points="180,260 305,260 305,272 330,272"
            fill="none" stroke="#c00" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- GND drops to rail -->
  <line x1="80"  y1="120" x2="80"  y2="460" stroke="#444" stroke-width="1.5"/>
  <line x1="265" y1="120" x2="265" y2="460" stroke="#444" stroke-width="1.5"/>
  <line x1="100" y1="430" x2="100" y2="460" stroke="#444" stroke-width="1.5"/>
  <line x1="415" y1="430" x2="415" y2="460" stroke="#444" stroke-width="1.5"/>
  <circle cx="80"  cy="460" r="3" fill="#444"/>
  <circle cx="100" cy="460" r="3" fill="#444"/>
  <circle cx="265" cy="460" r="3" fill="#444"/>
  <circle cx="415" cy="460" r="3" fill="#444"/>

  <!-- UART RX: GPIO20 (180,315) → PDN_UART (330,330) via routing -->
  <polyline points="180,315 298,315 298,330 330,330"
            fill="none" stroke="#36c" stroke-width="1.5"/>

  <!-- UART TX: GPIO21 (180,335) → 1kΩ resistor → PDN_UART (330,330) -->
  <line x1="180" y1="335" x2="224" y2="335" stroke="#36c" stroke-width="1.5"/>
  <rect x="224" y="329" width="32" height="12" rx="2" fill="white" stroke="#36c" stroke-width="1.5"/>
  <text x="240" y="338" text-anchor="middle" font-size="8" fill="#36c">1kΩ</text>
  <line x1="256" y1="335" x2="312" y2="335" stroke="#36c" stroke-width="1.5"/>
  <polyline points="312,335 312,330 330,330" fill="none" stroke="#36c" stroke-width="1.5"/>
  <!-- Junction at PDN_UART where RX + TX meet -->
  <circle cx="330" cy="330" r="4" fill="#36c"/>
  <circle cx="298" cy="330" r="3.5" fill="#36c"/>

  <!-- STEP: GPIO4 (180,370) → TMC STEP (330,370) -->
  <line x1="180" y1="370" x2="330" y2="370" stroke="#090" stroke-width="1.5"/>

  <!-- DIR: GPIO3 (180,398) → TMC DIR (330,398) -->
  <line x1="180" y1="398" x2="330" y2="398" stroke="#090" stroke-width="1.5"/>

  <!-- Motor coils: TMC right → NEMA left (orange) -->
  <polyline points="490,293 545,293 545,313 600,313" fill="none" stroke="#c60" stroke-width="2"/>
  <polyline points="490,318 548,318 548,335 600,335" fill="none" stroke="#c60" stroke-width="2"/>
  <polyline points="490,343 551,343 551,357 600,357" fill="none" stroke="#c60" stroke-width="2"/>
  <polyline points="490,368 554,368 554,379 600,379" fill="none" stroke="#c60" stroke-width="2"/>

  <!-- ===== LEGEND ===== -->
  <rect x="596" y="35" width="162" height="140" rx="4" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="677" y="52" text-anchor="middle" font-size="10" font-weight="bold" fill="#555">Legend</text>
  <line x1="608" y1="65"  x2="632" y2="65"  stroke="#c00" stroke-width="2"/>
  <text x="637" y="68" font-size="9" fill="#333">Power (5V / 24V)</text>
  <line x1="608" y1="82"  x2="632" y2="82"  stroke="#c00" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="637" y="85" font-size="9" fill="#333">Power (3.3V)</text>
  <line x1="608" y1="99"  x2="632" y2="99"  stroke="#444" stroke-width="2"/>
  <text x="637" y="102" font-size="9" fill="#333">GND</text>
  <line x1="608" y1="116" x2="632" y2="116" stroke="#36c" stroke-width="1.5"/>
  <text x="637" y="119" font-size="9" fill="#333">UART signal</text>
  <line x1="608" y1="133" x2="632" y2="133" stroke="#090" stroke-width="1.5"/>
  <text x="637" y="136" font-size="9" fill="#333">Step / Dir</text>
  <line x1="608" y1="150" x2="632" y2="150" stroke="#c60" stroke-width="2"/>
  <text x="637" y="153" font-size="9" fill="#333">Motor coils</text>

</svg>
