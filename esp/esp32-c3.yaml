# ESPHome configuration for Aitewin ESP32-C3 board with 0.42" OLED
# Board: Aitewin ESP32-C3 with SSD1306 0.42" OLED (72x40 resolution)

esphome:
  name: esp32-c3-stepper
  friendly_name: ESP32-C3 Stepper Controller
  on_boot:
    priority: -100
    then:
      - tmc2209.configure:
          id: my_stepper
          microsteps: 8
          interpolation: true
          enable_spreadcycle: false
      - tmc2209.currents:
          id: my_stepper
          run_current: 1.4  # 93% of rated 1.5A
          hold_current: 0.5
          standstill_mode: normal

external_components:
  - source: github://slimcdk/esphome-custom-components
    components: [tmc2209_hub, tmc2209, stepper]

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Enable logging
logger:
  level: INFO
  hardware_uart: USB_SERIAL_JTAG

# Enable Home Assistant API (optional, can be disabled if using MQTT only)
#api:
#  encryption:
#    key: !secret api_encryption_key

# Enable OTA updates
ota:
  - platform: esphome
#    password: !secret ota_password

# WiFi configuration
wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
    - ssid: !secret wifi_ssid2
      password: !secret wifi_password2

  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: "ESP32-C3-Stepper"
    password: !secret ap_password

# Web server for diagnostics
web_server:
  port: 80

# I2C bus for OLED display (Aitewin board typical pins)
i2c:
  sda: GPIO5
  scl: GPIO6
  scan: true
  id: bus_a

# OLED Display (SSD1306 0.42" - 72x40 resolution)
display:
  - platform: ssd1306_i2c
    model: "SSD1306 72x40"
    address: 0x3C
    update_interval: 500ms
    lambda: |-
      it.printf(0, 0, id(font_large), "%.1f mm", id(my_stepper).current_position / 800.0f);
      it.printf(0, 22, id(font_small), "%s", id(stepper_state).c_str());
      if (!isnan(id(tmc_tstep).state))
        it.printf(72, 22, id(font_small), TextAlign::TOP_RIGHT, "%s %s %.0fmA",
          id(wifi_status).state ? "W+" : "W-",
          id(mqtt_client)->is_connected() ? "M+" : "M-",
          id(tmc_tstep).state);
      else
        it.printf(72, 22, id(font_small), TextAlign::TOP_RIGHT, "%s %s",
          id(wifi_status).state ? "W+" : "W-",
          id(mqtt_client)->is_connected() ? "M+" : "M-");

globals:
  - id: stepper_state
    type: std::string
    restore_value: no
    initial_value: '"idle"'

font:
  - file: "fonts/arial.ttf"
    id: font_large
    size: 20
  - file: "fonts/arial.ttf"
    id: font_small
    size: 9

sensor:
  - platform: tmc2209
    id: tmc_tstep
    type: actual_current
    name: "TMC2209 Current"
    update_interval: 2s

# Text sensor for WiFi status
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip

binary_sensor:
  - platform: status
    name: "Status"
    id: wifi_status

# MQTT client configuration
mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  port: 1883
  on_message:
    - topic: stepper/command/position
      then:
        - lambda: |-
            int steps = (int)round(atof(x.c_str()) * 800.0);
            ESP_LOGI("stepper", "Moving to %d steps (%.1f mm)", steps, atof(x.c_str()));
            id(my_stepper).set_target(steps);
            id(stepper_state) = "moving";
    - topic: stepper/command/speed
      then:
        - lambda: |-
            id(my_stepper).set_max_speed(atof(x.c_str()));
    - topic: stepper/command/stop
      then:
        - lambda: |-
            id(my_stepper).set_target(id(my_stepper).current_position);
            id(stepper_state) = "stopped";
    - topic: stepper/command/home
      then:
        - lambda: |-
            id(my_stepper).set_target(0);
            id(stepper_state) = "homing";
    - topic: stepper/command/reset_position
      then:
        - lambda: |-
            id(my_stepper).report_position(0);
            id(my_stepper).set_target(0);

interval:
  - interval: 500ms
    then:
      - lambda: |-
          if (id(my_stepper).current_position == id(my_stepper).target_position)
            id(stepper_state) = "idle";
      - mqtt.publish:
          topic: stepper/status/position
          payload: !lambda 'return to_string(id(my_stepper).current_position / 800.0f);'
      - mqtt.publish:
          topic: stepper/status/state
          payload: !lambda 'return id(stepper_state);'

uart:
  id: uart_bus
  tx_pin: GPIO21
  rx_pin: GPIO20
  baud_rate: 115200

tmc2209_hub:
  id: tmc_hub
  uart_id: uart_bus

stepper:
  - platform: tmc2209
    id: my_stepper
    tmc2209_hub_id: tmc_hub
    address: 0
    step_pin: GPIO4
    dir_pin: GPIO3
    index_pin: GPIO1
    # ENN tied to GND (always enabled)
    rsense: 0.11
    max_speed: 8000 steps/s
    acceleration: 4000 steps/s^2
    deceleration: 4000 steps/s^2

