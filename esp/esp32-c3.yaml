# ESPHome configuration for Aitewin ESP32-C3 board with 0.42" OLED
# Board: Aitewin ESP32-C3 with SSD1306 0.42" OLED (72x40 resolution)

esphome:
  name: esp32-c3-stepper
  friendly_name: ESP32-C3 Stepper Controller

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API (optional, can be disabled if using MQTT only)
#api:
#  encryption:
#    key: !secret api_encryption_key

# Enable OTA updates
ota:
  - platform: esphome
#    password: !secret ota_password

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot in case wifi connection fails
  ap:
    ssid: "ESP32-C3-Stepper"
    password: !secret ap_password

# Web server for diagnostics
web_server:
  port: 80

# I2C bus for OLED display (Aitewin board typical pins)
i2c:
  sda: GPIO5
  scl: GPIO6
  scan: true
  id: bus_a

# OLED Display (SSD1306 0.42" - 72x40 resolution)
display:
  - platform: ssd1306_i2c
    model: "SSD1306 72x40"
    address: 0x3C
    lambda: |-
      it.printf(0, 0, id(font_small), "%.1f mm", id(stepper_position) / 1600.0f);
      it.printf(0, 14, id(font_small), "%s", id(wifi_status).state ? "WiFi OK" : "No WiFi");
      it.printf(0, 28, id(font_small), "%s", id(mqtt_client)->is_connected() ? "MQTT OK" : "No MQTT");

globals:
  - id: stepper_position
    type: int
    restore_value: no
    initial_value: '0'
  - id: stepper_speed
    type: int
    restore_value: no
    initial_value: '250'
  - id: stepper_state
    type: std::string
    restore_value: no
    initial_value: '"idle"'

# Font for small display
font:
  - file: "fonts/arial.ttf"
    id: font_small
    size: 13

# Text sensor for WiFi status
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip

binary_sensor:
  - platform: status
    name: "Status"
    id: wifi_status

# MQTT client configuration
mqtt:
  id: mqtt_client
  broker: !secret mqtt_broker
  port: 1883
  on_message:
    - topic: stepper/command/position
      then:
        - lambda: |-
            id(stepper_position) = (int)(atof(x.c_str()) * 1600.0f);
            id(stepper_state) = "moving";
    - topic: stepper/command/speed
      then:
        - lambda: |-
            id(stepper_speed) = atoi(x.c_str());
    - topic: stepper/command/stop
      then:
        - lambda: |-
            id(stepper_state) = "stopped";
    - topic: stepper/command/home
      then:
        - lambda: |-
            id(stepper_position) = 0;
            id(stepper_state) = "homing";
    - topic: stepper/command/reset_position
      then:
        - lambda: |-
            id(stepper_position) = 0;

interval:
  - interval: 500ms
    then:
      - mqtt.publish:
          topic: stepper/status/position
          payload: !lambda 'return to_string(id(stepper_position) / 1600.0f);'
      - mqtt.publish:
          topic: stepper/status/state
          payload: !lambda 'return id(stepper_state);'

